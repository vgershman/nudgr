services:
  postgres:
    image: postgres:16-alpine
    container_name: nudgr_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nudgr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nudgr_dev}
      POSTGRES_DB: ${POSTGRES_DB:-nudgr}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Localhost-only — never expose pg to the public IP on a VPS.
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nudgr}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nudgr_app
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-nudgr}:${POSTGRES_PASSWORD:-nudgr_dev}@postgres:5432/${POSTGRES_DB:-nudgr}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    stdin_open: true
    tty: true

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nudgr_bot
    command: ["python", "-m", "nudgr", "bot"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-nudgr}:${POSTGRES_PASSWORD:-nudgr_dev}@postgres:5432/${POSTGRES_DB:-nudgr}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  postgres_data:
